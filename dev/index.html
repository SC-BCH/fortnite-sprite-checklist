<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Fortnite Sprite Checklist [DEV]</title>
<meta name="theme-color" content="#0b1020" />
<link rel="manifest" href="./manifest.webmanifest" />
<style>
:root {
  color-scheme: dark;
  --bg1:#050816; --bg2:#0b1020; --panel:rgba(12,18,36,0.88); --line:rgba(255,255,255,0.12);
  --text:#f5f7ff; --muted:#c7cee2; --accent:#ff4d4f; --success:#8bffb0;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top,#15224a 0%,var(--bg1) 48%,#03050d 100%)}
button,input,select{font:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:14px 12px 18px}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:8px;font-size:15px}
.badge,.pill,.dev-flag,.lang-btn,.action{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:12px;padding:7px 11px;line-height:1;font-size:15px}
.badge{font-weight:800}
.badge.saved{font-size:12px;color:var(--success);padding:7px 10px}
.dev-flag{background:#4a1e1e;color:#ffd1d1;border-color:rgba(255,138,138,.4);font-weight:800;font-size:12px}
.lang-switch{display:flex;gap:6px;margin-right:4px}
.lang-btn{cursor:pointer;padding:7px 12px;font-weight:700;color:var(--muted)}
.lang-btn.is-active{color:#fff;border-color:rgba(122,162,255,.58);background:rgba(122,162,255,.18)}
.pill.label{padding-right:8px;color:var(--muted)}
.select,.name-input{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:12px;padding:9px 12px;min-height:38px;font-size:15px}
.name-input{min-width:150px}
.spacer{flex:1 1 auto}
.action{cursor:pointer;font-weight:700}
.hint{color:var(--muted);font-size:13px;margin:4px 0 10px}
.board{position:relative;width:100%;max-width:1180px;margin:0 auto;border-radius:22px;overflow:hidden;background:#d6d6d0;box-shadow:0 18px 44px rgba(0,0,0,.32)}
.board img{display:block;width:100%;height:auto;user-select:none;-webkit-user-drag:none;pointer-events:none}
.board.is-raw-export .layer{pointer-events:none}
.layer{position:absolute;inset:0}
.box{position:absolute;cursor:pointer;border-radius:8px;background:transparent;appearance:none;-webkit-appearance:none;border:0;padding:0;margin:0;outline:none;box-shadow:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.box::-webkit-focus-inner{border:0;padding:0}
.box:focus-visible{outline:2px solid rgba(122,162,255,.95);outline-offset:1px}
.mark{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.mark path.shadow{stroke:rgba(255,255,255,0.34);stroke-width:20;stroke-linecap:round;stroke-linejoin:round;fill:none}
.mark path.main{stroke:var(--accent);stroke-width:14;stroke-linecap:round;stroke-linejoin:round;fill:none}
.complete-badge{position:absolute;left:74.2%;top:3%;z-index:25;display:none;pointer-events:none;min-width:156px;padding:6px 8px 5px;border-radius:10px;border:2px solid rgba(255,215,0,.95);background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(255,246,204,.98));box-shadow:0 0 0 1px rgba(255,255,255,.72) inset,0 5px 12px rgba(0,0,0,.18),0 0 10px rgba(255,215,0,.24);transform:rotate(-4deg);text-align:center}
.complete-badge.show{display:flex;flex-direction:column;align-items:center;justify-content:center;animation:completePulse 1.1s ease-in-out infinite alternate}
.complete-badge-main{font-size:16px;line-height:1;font-weight:900;letter-spacing:.04em;color:#d62828;text-shadow:1px 1px 0 #fff,-1px -1px 0 #fff,0 0 6px rgba(255,215,0,.45)}
.complete-badge-sub{margin-top:3px;font-size:8px;line-height:1;font-weight:800;letter-spacing:.06em;color:#111}
@keyframes completePulse{from{transform:rotate(-4deg) scale(1)}to{transform:rotate(-4deg) scale(1.02)}}
.meta-overlay{position:absolute;left:2.35%;top:2.6%;z-index:20;pointer-events:none;display:flex;flex-direction:column;align-items:flex-start;gap:.28em;max-width:34%}
.meta-line{margin:0;line-height:1;font-family:"Arial Black","Arial",sans-serif;font-weight:700;color:#111;text-shadow:-2px -2px 0 rgba(255,255,255,.7),2px -2px 0 rgba(255,255,255,.7),-2px 2px 0 rgba(255,255,255,.7),2px 2px 0 rgba(255,255,255,.7);word-break:break-word}
.meta-line.date-overlay,.meta-line.count-overlay{font-size:clamp(12px,1.35vw,20px)}
.meta-line.name-overlay.size-small{font-size:clamp(14px,1.7vw,24px)}
.meta-line.name-overlay.size-medium{font-size:clamp(16px,2vw,30px)}
.meta-line.name-overlay.size-large{font-size:clamp(18px,2.4vw,36px)}
.meta-line.color-black{color:#111}
.meta-line.color-red{color:#d11d2c}
.meta-line.color-white{color:#fff;text-shadow:0 0 2px rgba(0,0,0,.9),0 0 5px rgba(0,0,0,.7)}
.meta-line.is-hidden{display:none}
.footer{margin-top:10px;text-align:center;color:var(--muted);font-size:13px}
.footer a{color:inherit}
@media (max-width:640px) {
  .wrap{padding:10px 8px 14px}
  .toolbar{font-size:14px}
  .name-input{min-width:0;flex:1 1 148px}
  .complete-badge{left:73.8%;top:2.6%;min-width:118px;padding:5px 6px 4px}
  .complete-badge-main{font-size:12px}
  .complete-badge-sub{font-size:7px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <span class="badge count" id="countBadge">0 / 61</span>
    <span class="badge saved" id="saveBadge">保存済み</span>
    <span class="dev-flag" id="devModeFlag">DEV</span>
    <div class="lang-switch" aria-label="Language switch">
      <button class="lang-btn is-active" id="langJaBtn" type="button">日本語</button>
      <button class="lang-btn" id="langEnBtn" type="button">English</button>
    </div>
    <input class="name-input" id="nameInput" type="text" placeholder="名前（任意）" maxlength="32" autocomplete="nickname" />
    <span class="pill label" id="colorLabel">文字色</span>
    <select class="select" id="nameColorSelect" aria-label="文字色">
      <option value="black">黒</option>
      <option value="red">赤</option>
      <option value="white">白</option>
    </select>
    <span class="pill label" id="sizeLabel">名前サイズ</span>
    <select class="select" id="nameSizeSelect" aria-label="名前サイズ">
      <option value="small">小</option>
      <option value="medium" selected>中</option>
      <option value="large">大</option>
    </select>
    <span class="spacer"></span>
    <button class="action" id="saveImageBtn" type="button">画像保存</button>
    <button class="action" id="resetBtn" type="button">全解除</button>
    <a class="action" href="./hub.html">JSON HUB</a>
  </div>
  <div class="hint" id="pageHint">開発版です。タップで切替。状態はこの端末のブラウザに保存されます。本番環境とは別キーに保存されます。</div>
  <div class="board" id="board">
    <img id="boardImage" alt="Fortnite Sprite Checklist" />
    <div class="meta-overlay" id="metaOverlay">
      <div class="meta-line date-overlay" id="dateOverlay"></div>
      <div class="meta-line count-overlay" id="countOverlay"></div>
      <div class="meta-line name-overlay is-hidden" id="nameOverlay"></div>
    </div>
    <div class="layer" id="layer" aria-label="Fortnite Sprite Checklist"></div>
    <div id="completeBadge" class="complete-badge" aria-hidden="true">
      <span class="complete-badge-main">COMPLETE!</span>
      <span class="complete-badge-sub">61 / 61 COLLECTED</span>
    </div>
  </div>
  <div class="footer" id="pageFooter">DEV環境 / 本番とは別保存 | Produced by BCH | <a href="https://x.com/BCH_1025" target="_blank" rel="noopener noreferrer">X @BCH_1025</a></div>
</div>

function fitFontSize(ctx, text, weight, startSize, minSize, maxWidth, fontFamily) {

    updateCompleteBadge();
    pageHint.textContent = t("hint");
  } catch (error) {
    console.error(error);
    pageHint.textContent = "開発版画像の読込に失敗しました。再読込してください。";
  }
}
init();
</script>
