<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fortnite Sprite Checklist [DEV]</title>
<meta name="theme-color" content="#0f1115">
<style>
html,body {
  margin:0;
  padding:0;
  min-height:100%;
  background:linear-gradient(180deg, #0d1015 0%, #141922 100%);
  color:#eef2f7;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
}
.body-wrap {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.panel {
  width:min(100%, 560px);
  background:#171b22;
  border-radius:18px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.35);
}
.badge {
  display:inline-flex;
  align-items:center;
  gap:8px;
  border-radius:999px;
  padding:8px 12px;
  background:#5a1c1c;
  box-shadow:inset 0 0 0 1px rgba(255,120,120,0.34);
  font-weight:700;
  font-size:13px;
  margin-bottom:14px;
}
.hint {
  color:#a9b3c1;
  font-size:14px;
  line-height:1.6;
}
</style>
</head>
<body>
<div class="body-wrap">
  <div class="panel">
    <div class="badge">DEV</div>
    <div class="hint">開発版を読み込み中です...</div>
  </div>
</div>
<script>
(async () => {
  const response = await fetch("../index.html?dev-template=1", { cache: "no-store" });
  if (!response.ok) {
    throw new Error(`Failed to load prod template: ${response.status}`);
  }

  let html = await response.text();

  const replacements = [
    ["<title>Fortnite Sprite Checklist</title>", "<title>Fortnite Sprite Checklist [DEV]</title>"],
    ["<meta name=\"apple-mobile-web-app-title\" content=\"Sprite Checklist\">", "<meta name=\"apple-mobile-web-app-title\" content=\"Sprite Checklist DEV\">"],
    ["<link rel=\"apple-touch-icon\" href=\"./icons/icon-192.png\">", "<link rel=\"apple-touch-icon\" href=\"../icons/icon-192.png\">"],
    ["const STORAGE_KEY = \"fortnite_sprite_checklist_v4\";", "const STORAGE_KEY = \"fortnite_sprite_checklist_v4_dev\";"],
    ["const NAME_STORAGE_KEY = \"fortnite_sprite_checklist_name_v1\";", "const NAME_STORAGE_KEY = \"fortnite_sprite_checklist_name_v1_dev\";"],
    ["const NAME_COLOR_STORAGE_KEY = \"fortnite_sprite_checklist_name_color_v1\";", "const NAME_COLOR_STORAGE_KEY = \"fortnite_sprite_checklist_name_color_v1_dev\";"],
    ["const NAME_SIZE_STORAGE_KEY = \"fortnite_sprite_checklist_name_size_v1\";", "const NAME_SIZE_STORAGE_KEY = \"fortnite_sprite_checklist_name_size_v1_dev\";"],
    ["<div class=\"badge\" id=\"saveBadge\">保存済み</div>", "<div class=\"badge\" id=\"saveBadge\">保存済み</div>\n    <div class=\"badge env-badge\">DEV</div>"],
    ["<div class=\"hint\">タップで切替。状態はこの端末のブラウザに保存されます。</div>", "<div class=\"hint\">開発版です。タップで切替。状態はこの端末のブラウザに保存されます。本番環境とは別キーに保存されます。</div>"],
    ["<div class=\"footer\">HTML単体版 / ローカル保存対応 | Produced by BCH | <a href=\"https://x.com/BCH_1025\" target=\"_blank\" rel=\"noopener noreferrer\">X @BCH_1025</a></div>", "<div class=\"footer\">DEV環境 / 本番とは別保存 | Produced by BCH | <a href=\"https://x.com/BCH_1025\" target=\"_blank\" rel=\"noopener noreferrer\">X @BCH_1025</a></div>"],
    ["navigator.serviceWorker.register(\"./sw.js\")", "navigator.serviceWorker.register(\"./sw.js?dev=2\")"]
  ];

  for (const [from, to] of replacements) {
    html = html.replace(from, to);
  }

  html = html.replace(
    ".badge {\n  padding:10px 12px; border-radius:999px; background:var(--panel); font-weight:700; font-size:14px; line-height:1;\n  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);\n}",
    ".badge {\n  padding:10px 12px; border-radius:999px; background:var(--panel); font-weight:700; font-size:14px; line-height:1;\n  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);\n}\n.env-badge {\n  background:#5a1c1c;\n  box-shadow:inset 0 0 0 1px rgba(255,120,120,0.34);\n}"
  );

  document.open();
  document.write(html);
  document.close();
})().catch((error) => {
  console.error(error);
  document.body.innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(180deg,#0d1015 0%,#141922 100%);color:#eef2f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans JP',sans-serif;">
      <div style="width:min(100%,560px);background:#171b22;border-radius:18px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,0.35);">
        <div style="display:inline-flex;align-items:center;border-radius:999px;padding:8px 12px;background:#5a1c1c;box-shadow:inset 0 0 0 1px rgba(255,120,120,0.34);font-weight:700;font-size:13px;margin-bottom:14px;">DEV</div>
        <div style="color:#eef2f7;font-weight:700;margin-bottom:8px;">開発版の読み込みに失敗しました。</div>
        <div style="color:#a9b3c1;font-size:14px;line-height:1.6;word-break:break-word;">${String(error && error.message ? error.message : error)}</div>
      </div>
    </div>`;
});
</script>
</body>
</html>
