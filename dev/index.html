<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fortnite Sprite Checklist [DEV]</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sprite Checklist DEV">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&display=swap">
<style>
:root {
  --bg:#0f1115; --panel:#171b22; --text:#eef2f7; --muted:#a9b3c1; --accent:#ff4d4f; --board-max:1180px;
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  background:linear-gradient(180deg, #0d1015 0%, #141922 100%);
  color:var(--text);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
}
.wrap {
  width:min(100%, calc(var(--board-max) + 24px));
  margin:0 auto;
  padding:max(12px, env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));
}
.toolbar {
  display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px;
}
.badge {
  padding:10px 12px; border-radius:999px; background:var(--panel); font-weight:700; font-size:14px; line-height:1;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
}
.env-badge {
  background:#5a1c1c;
  box-shadow:inset 0 0 0 1px rgba(255,120,120,0.34);
}
.spacer { flex:1 1 auto; }
button.action {
  appearance:none; border:0; border-radius:12px; padding:10px 14px; background:#242c39; color:var(--text); font-weight:700;
  cursor:pointer; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}
.name-input,
.name-color-select,
.name-size-select {
  appearance:none;
  -webkit-appearance:none;
  border:0;
  border-radius:12px;
  padding:10px 14px;
  background:#242c39;
  color:var(--text);
  font:inherit;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}
.name-input {
  min-width:180px;
}
.name-color-select,
.name-size-select {
  min-width:96px;
  cursor:pointer;
}
.name-input::placeholder {
  color:rgba(238,242,247,0.58);
}
.labeled-select {
  display:flex;
  align-items:center;
  gap:8px;
}
.control-label {
  color:var(--muted);
  font-size:13px;
  font-weight:700;
  line-height:1;
  white-space:nowrap;
}
.hint { color:var(--muted); font-size:13px; margin:2px 0 12px; }
.board {
  position:relative; width:100%; max-width:var(--board-max); margin:0 auto; border-radius:18px; overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.35); line-height:0;
}
.board img {
  width:100%; height:auto; display:block; touch-action:manipulation; user-select:none; -webkit-user-select:none; -webkit-user-drag:none;
}
.dev-mode-flag {
  display:none;
  color:#ff4d4f;
  font-weight:700;
  font-size:13px;
  line-height:1;
  padding:0 4px;
}
.dev-mode-flag.is-visible {
  display:block;
}
.meta-overlay {
  position:absolute;
  left:2.35%;
  top:2.15%;
  max-width:30%;
  pointer-events:none;
  z-index:2;
  display:flex;
  flex-direction:column;
  gap:2px;
}
.meta-line {
  font-family:"Zen Kaku Gothic New", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
  font-weight:700;
  line-height:1.06;
  letter-spacing:0.02em;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.date-overlay {
  font-size:clamp(12px, 0.96vw, 15px);
}
.count-overlay {
  font-size:clamp(12px, 0.96vw, 15px);
}
.name-overlay {
  font-size:clamp(14px, 1.12vw, 18px);
}
.name-overlay.name-size-small {
  font-size:clamp(12px, 0.98vw, 16px);
}
.name-overlay.name-size-medium {
  font-size:clamp(14px, 1.12vw, 18px);
}
.name-overlay.name-size-large {
  font-size:clamp(16px, 1.28vw, 21px);
}
.meta-line.meta-color-white {
  color:rgba(255,255,255,0.96);
  text-shadow:0 1px 2px rgba(0,0,0,0.34), 0 0 1px rgba(0,0,0,0.26);
}
.meta-line.meta-color-black {
  color:#141414;
  text-shadow:0 1px 2px rgba(255,255,255,0.58), 0 0 1px rgba(255,255,255,0.42);
}
.meta-line.meta-color-red {
  color:#c93642;
  text-shadow:0 1px 2px rgba(255,255,255,0.72), 0 0 1px rgba(255,255,255,0.56);
}
.meta-line.is-hidden {
  display:none;
}
.board.is-raw-export .layer {
  pointer-events:none;
}
.layer { position:absolute; inset:0; z-index:1; }
.hit {
  position:absolute;
  appearance:none;
  -webkit-appearance:none;
  border:0;
  background:transparent;
  padding:0;
  margin:0;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color: transparent;
}
.hit::before {
  content:"";
  position:absolute;
  inset:-8px;
}
.hit:focus-visible {
  outline:2px solid rgba(255,255,255,0.95);
  outline-offset:2px;
  border-radius:6px;
}
.mark {
  position:absolute;
  inset:8%;
  width:84%;
  height:84%;
  pointer-events:none;
}
.mark path.shadow {
  stroke:rgba(255,255,255,0.34);
  stroke-width:20;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
}
.mark path.main {
  stroke:var(--accent);
  stroke-width:14;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
}
.complete-badge {
  position:absolute;
  left:74.2%;
  top:3.0%;
  z-index:25;
  display:none;
  pointer-events:none;
  min-width:156px;
  padding:6px 8px 5px;
  border-radius:10px;
  border:2px solid rgba(255,215,0,0.95);
  background:linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,246,204,0.98));
  box-shadow:0 0 0 1px rgba(255,255,255,0.72) inset, 0 5px 12px rgba(0,0,0,0.18), 0 0 10px rgba(255,215,0,0.24);
  transform:rotate(-4deg);
  text-align:center;
}
.complete-badge.show {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  animation:completePulse 1.1s ease-in-out infinite alternate;
}
.complete-badge-main {
  font-size:16px;
  line-height:1;
  font-weight:900;
  letter-spacing:0.04em;
  color:#d62828;
  text-shadow:1px 1px 0 #ffffff, -1px -1px 0 #ffffff, 0 0 6px rgba(255,215,0,0.45);
}
.complete-badge-sub {
  margin-top:3px;
  font-size:8px;
  line-height:1;
  font-weight:800;
  letter-spacing:0.06em;
  color:#111111;
}
@keyframes completePulse {
  from {
    transform:rotate(-4deg) scale(1);
    box-shadow:0 0 0 1px rgba(255,255,255,0.72) inset, 0 5px 12px rgba(0,0,0,0.18), 0 0 10px rgba(255,215,0,0.24);
  }
  to {
    transform:rotate(-5deg) scale(1.02);
    box-shadow:0 0 0 1px rgba(255,255,255,0.84) inset, 0 8px 18px rgba(0,0,0,0.24), 0 0 16px rgba(255,215,0,0.40);
  }
}
@media (max-width:640px) {
  .complete-badge {
    left:68.2%;
    top:6.7%;
    min-width:132px;
    padding:5px 7px 4px;
    border-width:2px;
  }
  .complete-badge-main {
    font-size:14px;
  }
  .complete-badge-sub {
    margin-top:3px;
    font-size:7px;
  }
}

.lang-switch {
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px;
  border-radius:999px;
  background:#242c39;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}
.lang-btn {
  appearance:none;
  -webkit-appearance:none;
  border:0;
  border-radius:999px;
  padding:8px 12px;
  background:transparent;
  color:var(--muted);
  font:inherit;
  font-weight:700;
  line-height:1;
  cursor:pointer;
}
.lang-btn.is-active {
  background:rgba(255,255,255,0.12);
  color:var(--text);
}
@media (max-width:640px) {
  .lang-switch {
    width:100%;
    justify-content:flex-start;
  }
  .lang-btn {
    padding:9px 12px;
    font-size:13px;
  }
}

.footer { padding:14px 2px 6px; color:var(--muted); font-size:12px; text-align:center; }
.footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; }
.footer a:hover { opacity:0.9; }
@media (max-width:640px) {
  .badge { font-size:13px; padding:9px 11px; }
  button.action { font-size:13px; padding:9px 12px; }
  .name-input,
  .name-color-select,
  .name-size-select { min-width:100%; font-size:13px; padding:9px 12px; }
  .labeled-select {
    width:100%;
  }
  .control-label {
    min-width:64px;
    font-size:12px;
  }
  .dev-mode-flag { font-size:12px; padding:0; }
  .meta-overlay { max-width:48%; }
  .date-overlay { font-size:clamp(11px, 2.7vw, 14px); }
  .count-overlay { font-size:clamp(11px, 2.7vw, 14px); }
  .name-overlay { font-size:clamp(12px, 3.2vw, 16px); }
  .name-overlay.name-size-small { font-size:clamp(11px, 2.8vw, 14px); }
  .name-overlay.name-size-medium { font-size:clamp(12px, 3.2vw, 16px); }
  .name-overlay.name-size-large { font-size:clamp(13px, 3.6vw, 18px); }
  .complete-badge {
    right:10px;
    bottom:10px;
    padding:10px 14px 8px;
    border-radius:14px;
  }
  .complete-badge-main { font-size:18px; }
  .complete-badge-sub { font-size:10px; }
  .hint { font-size:12px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <div class="badge" id="countBadge">0 / 46</div>
    <div class="badge" id="saveBadge">保存済み</div>
    <div class="lang-switch" id="langSwitch" aria-label="Language switch">
      <button class="lang-btn is-active" id="langJaBtn" type="button">日本語</button>
      <button class="lang-btn" id="langEnBtn" type="button">English</button>
    </div>
    <div class="badge env-badge">DEV</div>
    <input class="name-input" id="nameInput" type="text" maxlength="32" placeholder="名前（任意）">
    <div class="labeled-select">
      <span class="control-label" id="colorLabel">文字色</span>
      <select class="name-color-select" id="nameColorSelect" aria-label="名前文字色">
        <option value="black">黒</option>
        <option value="red">赤</option>
        <option value="white">白</option>

    </div>
    <div class="labeled-select">
      <span class="control-label" id="sizeLabel">名前サイズ</span>
      <select class="name-size-select" id="nameSizeSelect" aria-label="名前サイズ">
        <option value="small">小</option>
        <option value="medium" selected>中</option>
        <option value="large">大</option>
      </select>
    </div>
    <div class="dev-mode-flag" id="devModeFlag">開発者モード</div>
    <div class="spacer"></div>

    <button class="action" id="resetBtn" type="button">全解除</button>

  boxes.forEach((box) => {
    if (!rawMode && state[box.id]) drawCheckOnContext(ctx, box);
  });
  drawCompleteStamp(ctx);

  const blob = await new Promise((resolve, reject) => {
    canvas.toBlob((value) => {
      if (value) resolve(value);
      else reject(new Error("画像化に失敗しました。"));
    }, "image/png");
  });

  return blob;
}
function makeExportFileName() {
  const now = new Date();
  const pad = (value) => String(value).padStart(2, "0");
  return `fortnite_sprite_checklist_${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.png`;
}
function shouldUseNativeShare() {
  const ua = navigator.userAgent || "";
  const isIOS = /iP(hone|ad|od)/.test(ua);
  const isAndroid = /Android/i.test(ua);
  return isIOS || isAndroid;
}
async function saveChecklistImage() {
  const beforeText = saveBadge.textContent;
  saveImageBtn.disabled = true;
  saveBadge.textContent = t("generating");

  try {
    const blob = await buildChecklistBlob();
    const fileName = makeExportFileName();
    const canMakeFile = typeof File === "function";
    const file = canMakeFile ? new File([blob], fileName, { type: "image/png" }) : null;
    const canUseNativeShare =
      shouldUseNativeShare() &&
      !!file &&
      typeof navigator.share === "function" &&
      (
        typeof navigator.canShare !== "function" ||
        navigator.canShare({ files: [file] })
      );

    if (canUseNativeShare) {
      saveBadge.textContent = t("sharing");
      await navigator.share({ files: [file], title: "Fortnite Sprite Checklist" });
      saveBadge.textContent = t("saved");
      return;
    }

    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    link.remove();

    const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent || "");
    if (isIOS) {
      window.open(url, "_blank", "noopener");
    }

    setTimeout(() => URL.revokeObjectURL(url), 60 * 1000);
    saveBadge.textContent = t("saved");
  } catch (error) {
    console.error(error);
    if (error && error.name === "AbortError") {
      saveBadge.textContent = beforeText || "保存済み";
    } else {
      saveBadge.textContent = t("saveFailed");
    }
  } finally {
    saveImageBtn.disabled = false;
    if (saveBadge.textContent === beforeText && beforeText) saveBadge.textContent = beforeText;
  }
}
function toggle(id) {
  state[id] = !state[id];
  saveBadge.textContent = t("saving");
  saveState(state);
  render();
}
function render() {
  const rawMode = isRawExportMode();
  syncMetaOverlay();
  layer.innerHTML = "";
  boxes.forEach((b) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "hit";
    btn.style.left = pctX(b.x) + "%";
    btn.style.top = pctY(b.y) + "%";
    btn.style.width = pctX(b.w) + "%";
    btn.style.height = pctY(b.h) + "%";
    btn.setAttribute("aria-label", b.label);
    btn.setAttribute("aria-pressed", state[b.id] ? "true" : "false");
    btn.addEventListener("click", () => toggle(b.id));
    btn.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        toggle(b.id);
      }
    });
    if (!rawMode && state[b.id]) btn.appendChild(makeMark());
    layer.appendChild(btn);
  });
  updateCount();
  updateCompleteBadge();
}
nameInput.addEventListener("input", () => {
  displayName = saveName(nameInput.value);
  syncMetaOverlay();
  render();
});
nameColorSelect.addEventListener("change", () => {
  displayNameColor = saveNameColor(nameColorSelect.value);
  syncMetaOverlay();
});
nameSizeSelect.addEventListener("change", () => {
  displayNameSize = saveNameSize(nameSizeSelect.value);
  syncMetaOverlay();
});
langJaBtn.addEventListener("click", () => {
  currentLanguage = saveLanguage("ja");
  applyLanguage();
  syncMetaOverlay();
  render();
});
langEnBtn.addEventListener("click", () => {
  currentLanguage = saveLanguage("en");
  applyLanguage();
  syncMetaOverlay();
  render();
});
saveImageBtn.addEventListener("click", () => {
  saveChecklistImage();
});
resetBtn.addEventListener("click", () => {
  state = {};
  saveBadge.textContent = t("saving");
  saveState(state);
  render();
});
applyLanguage();
syncMetaOverlay();
render();
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
