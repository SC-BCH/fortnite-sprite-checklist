<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Fortnite Sprite Checklist [DEV]</title>
<meta name="theme-color" content="#0b1020" />
<link rel="manifest" href="./manifest.webmanifest" />
<style>
:root {
  color-scheme: dark;
  --bg1:#050816; --bg2:#0b1020; --panel:rgba(12,18,36,0.88); --line:rgba(255,255,255,0.12);
  --text:#f5f7ff; --muted:#c7cee2; --accent:#ff4d4f; --accent2:#7aa2ff; --success:#8bffb0;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top, #15224a 0%, var(--bg1) 48%, #03050d 100%)}
button,input,select{font:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:14px 12px 18px}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:8px;font-size:15px}
.badge,.pill,.dev-flag,.lang-btn,.action{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:12px;padding:7px 11px;line-height:1;font-size:15px}
.badge{font-weight:800}
.badge.saved{font-size:12px;color:var(--success);padding:7px 10px}
.dev-flag{background:#4a1e1e;color:#ffd1d1;border-color:rgba(255,138,138,.4);font-weight:800;font-size:12px}
.lang-switch{display:flex;gap:6px;margin-right:4px}
.lang-btn{cursor:pointer;padding:7px 12px;font-weight:700;color:var(--muted)}
.lang-btn.is-active{color:#fff;border-color:rgba(122,162,255,.58);background:rgba(122,162,255,.18)}
.pill.label{padding-right:8px;color:var(--muted)}
.select,.name-input{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:12px;padding:9px 12px;min-height:38px;font-size:15px}
.name-input{min-width:150px}
.spacer{flex:1 1 auto}
.action{cursor:pointer;font-weight:700}
.hint{color:var(--muted);font-size:13px;margin:4px 0 10px}
.board{position:relative;width:100%;max-width:1180px;margin:0 auto;border-radius:22px;overflow:hidden;background:#d6d6d0;box-shadow:0 18px 44px rgba(0,0,0,.32)}
.board img{display:block;width:100%;height:auto;user-select:none;-webkit-user-drag:none;pointer-events:none}
.layer{position:absolute;inset:0}
.box{position:absolute;cursor:pointer;border-radius:8px;background:transparent}
.box:focus-visible{outline:2px solid rgba(122,162,255,.95);outline-offset:1px}
.mark{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.mark path.shadow{stroke:rgba(255,255,255,.34);stroke-width:20;stroke-linecap:round;stroke-linejoin:round;fill:none}
.mark path.main{stroke:var(--accent);stroke-width:14;stroke-linecap:round;stroke-linejoin:round;fill:none}
.complete-badge{position:absolute;left:74.2%;top:3%;z-index:25;display:none;pointer-events:none;min-width:156px;padding:6px 8px 5px;border-radius:10px;border:2px solid rgba(255,215,0,.95);background:linear-gradient(135deg, rgba(255,255,255,.95), rgba(255,246,204,.98));box-shadow:0 0 0 1px rgba(255,255,255,.72) inset,0 5px 12px rgba(0,0,0,.18),0 0 10px rgba(255,215,0,.24);transform:rotate(-4deg);text-align:center}
.complete-badge.show{display:flex;flex-direction:column;align-items:center;justify-content:center;animation:completePulse 1.1s ease-in-out infinite alternate}
.complete-badge-main{font-size:16px;line-height:1;font-weight:900;letter-spacing:.04em;color:#d62828;text-shadow:1px 1px 0 #fff,-1px -1px 0 #fff,0 0 6px rgba(255,215,0,.45)}
.complete-badge-sub{margin-top:3px;font-size:8px;line-height:1;font-weight:800;letter-spacing:.06em;color:#111}
@keyframes completePulse{from{transform:rotate(-4deg) scale(1)}to{transform:rotate(-4deg) scale(1.02)}}
.meta-overlay{position:absolute;left:2.35%;top:2.6%;z-index:20;pointer-events:none;display:flex;flex-direction:column;align-items:flex-start;gap:.28em;max-width:34%}
.meta-line{margin:0;line-height:1;font-family:"Arial Black","Arial",sans-serif;font-weight:700;color:#111;text-shadow:-2px -2px 0 rgba(255,255,255,.7),2px -2px 0 rgba(255,255,255,.7),-2px 2px 0 rgba(255,255,255,.7),2px 2px 0 rgba(255,255,255,.7);word-break:break-word}
.meta-line.date-overlay,.meta-line.count-overlay{font-size:clamp(12px,1.35vw,20px)}
.meta-line.name-overlay.size-small{font-size:clamp(14px,1.7vw,24px)}
.meta-line.name-overlay.size-medium{font-size:clamp(16px,2vw,30px)}
.meta-line.name-overlay.size-large{font-size:clamp(18px,2.4vw,36px)}
.meta-line.color-black{color:#111}
.meta-line.color-red{color:#d11d2c}
.meta-line.color-white{color:#fff;text-shadow:0 0 2px rgba(0,0,0,.9),0 0 5px rgba(0,0,0,.7)}
.meta-line.is-hidden{display:none}
.footer{margin-top:10px;text-align:center;color:var(--muted);font-size:13px}
.footer a{color:inherit}
@media (max-width:640px) {
  .wrap{padding:10px 8px 14px} .toolbar{font-size:14px} .name-input{min-width:0;flex:1 1 148px}
  .complete-badge{left:73.8%;top:2.6%;min-width:118px;padding:5px 6px 4px}
  .complete-badge-main{font-size:12px} .complete-badge-sub{font-size:7px}
}
</style>
</head>

  const maxWidth = 720;
  const color = displayNameColor === "red" ? {fill:"#d11d2c", stroke:"rgba(255,255,255,0.72)"} :
                displayNameColor === "white" ? {fill:"#fff", stroke:"rgba(0,0,0,0.92)"} :
                {fill:"#111", stroke:"rgba(255,255,255,0.72)"};
  const x=48, dateY=42, countY=72, nameY=name ? 102 : 0;
  const nameStart = displayNameSize === "small" ? 30 : displayNameSize === "large" ? 42 : 36;
  const nameMin = displayNameSize === "small" ? 20 : displayNameSize === "large" ? 28 : 24;
  ctx.save(); ctx.textBaseline="top"; ctx.lineJoin="round";
  const drawLine = (text, y, start=30, min=22) => {
    const sz = fitFontSize(ctx, text, 700, start, min, maxWidth, fontFamily);
    ctx.font = `700 ${sz}px ${fontFamily}`; ctx.strokeStyle = color.stroke; ctx.lineWidth = 4; ctx.strokeText(text, x, y); ctx.fillStyle = color.fill; ctx.fillText(text, x, y);
  };
  drawLine(dateText, dateY);
  drawLine(countText, countY);
  if (name) drawLine(name, nameY, nameStart, nameMin);
  ctx.restore();
}
function roundRect(ctx,x,y,w,h,r) { ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function drawCompleteStamp(ctx) {
  if (!isComplete() || isRawExportMode()) return;
  const x=1520,y=54,w=168,h=58,r=10;
  ctx.save(); ctx.beginPath(); roundRect(ctx,x,y,w,h,r);
  ctx.shadowColor="rgba(0,0,0,0.20)"; ctx.shadowBlur=8; ctx.shadowOffsetY=4;
  const grad=ctx.createLinearGradient(x,y,x+w,y+h); grad.addColorStop(0,"rgba(255,255,255,0.96)"); grad.addColorStop(1,"rgba(255,246,204,0.98)");
  ctx.fillStyle=grad; ctx.fill(); ctx.shadowColor="transparent"; ctx.lineWidth=2.5; ctx.strokeStyle="rgba(255,215,0,0.95)"; ctx.stroke();
  ctx.translate(x+w/2,y+h/2); ctx.rotate(-4*Math.PI/180); ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle="#d62828"; ctx.font="900 22px Arial"; ctx.fillText("COMPLETE!",0,-8);
  ctx.fillStyle="#111"; ctx.font="800 10px Arial"; ctx.fillText(`${boxes.length} / ${boxes.length} COLLECTED`,0,11); ctx.restore();
}
async function buildChecklistBlob() {
  if (!boardImage.complete || !boardImage.naturalWidth) await new Promise((resolve,reject)=>{boardImage.addEventListener("load",resolve,{once:true});boardImage.addEventListener("error",reject,{once:true});});
  const canvas = document.createElement("canvas"); canvas.width = IMAGE_WIDTH; canvas.height = IMAGE_HEIGHT;
  const ctx = canvas.getContext("2d"); ctx.drawImage(boardImage,0,0,IMAGE_WIDTH,IMAGE_HEIGHT);
  if (document.fonts?.ready) try { await document.fonts.ready; } catch {}
  drawMetaText(ctx); boxes.forEach((box)=>{ if(state[box.id]) drawCheckOnContext(ctx, box); }); drawCompleteStamp(ctx);
  return await new Promise((resolve)=>canvas.toBlob(resolve, "image/png"));
}
async function saveImage() {
  const blob = await buildChecklistBlob(); if (!blob) return;
  const url = URL.createObjectURL(blob); const a = document.createElement("a");
  a.href = url; a.download = `fortnite-sprite-checklist-${formatCurrentDate()}.png`; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}
nameInput.value = displayName; nameColorSelect.value = displayNameColor; nameSizeSelect.value = displayNameSize;
nameInput.addEventListener("input", (e)=>{ displayName=e.target.value; localStorage.setItem(NAME_STORAGE_KEY, displayName); saveBadge.textContent=t("saved"); refreshMetaOverlay(); updateCompleteBadge(); });
nameColorSelect.addEventListener("change", (e)=>{ displayNameColor=normalizeColor(e.target.value); localStorage.setItem(NAME_COLOR_STORAGE_KEY, displayNameColor); saveBadge.textContent=t("saved"); refreshMetaOverlay(); });
nameSizeSelect.addEventListener("change", (e)=>{ displayNameSize=normalizeSize(e.target.value); localStorage.setItem(NAME_SIZE_STORAGE_KEY, displayNameSize); saveBadge.textContent=t("saved"); refreshMetaOverlay(); });
langJaBtn.addEventListener("click", ()=>{ currentLanguage="ja"; localStorage.setItem(LANGUAGE_STORAGE_KEY,currentLanguage); applyLanguage(); });
langEnBtn.addEventListener("click", ()=>{ currentLanguage="en"; localStorage.setItem(LANGUAGE_STORAGE_KEY,currentLanguage); applyLanguage(); });
saveImageBtn.addEventListener("click", saveImage);
resetBtn.addEventListener("click", ()=>{ state={}; saveJSON(STORAGE_KEY,state); saveBadge.textContent=t("saved"); rebuildLayer(); updateCount(); refreshMetaOverlay(); updateCompleteBadge(); });
const init = () => { rebuildLayer(); updateCount(); refreshMetaOverlay(); applyLanguage(); updateCompleteBadge(); };
boardImage.addEventListener("load", init);
if (boardImage.complete) init();
