<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fortnite Sprite Checklist [DEV]</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sprite Checklist DEV">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&display=swap">
<style>
:root {
  --bg:#0f1115; --panel:#171b22; --text:#eef2f7; --muted:#a9b3c1; --accent:#ff4d4f; --board-max:1180px;
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  background:linear-gradient(180deg, #0d1015 0%, #141922 100%);
  color:var(--text);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
}
.wrap {
  width:min(100%, calc(var(--board-max) + 24px));
  margin:0 auto;
  padding:max(12px, env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));
}
.toolbar {
  display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px;
}
.badge {
  padding:10px 12px; border-radius:999px; background:var(--panel); font-weight:700; font-size:14px; line-height:1;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
}
.env-badge {
  background:#5a1c1c;
  box-shadow:inset 0 0 0 1px rgba(255,120,120,0.34);
}
.spacer { flex:1 1 auto; }
button.action {
  appearance:none; border:0; border-radius:12px; padding:10px 14px; background:#242c39; color:var(--text); font-weight:700;
  cursor:pointer; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}
.name-input,
.name-color-select,
.name-size-select {
  appearance:none;
  -webkit-appearance:none;
  border:0;
  border-radius:12px;
  padding:10px 14px;
  background:#242c39;
  color:var(--text);
  font:inherit;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}
.name-input {
  min-width:180px;
}
.name-color-select,
.name-size-select {
  min-width:96px;
  cursor:pointer;
}
.name-input::placeholder {
  color:rgba(238,242,247,0.58);
}
.labeled-select {
  display:flex;
  align-items:center;
  gap:8px;
}
.control-label {
  color:var(--muted);
  font-size:13px;
  font-weight:700;
  line-height:1;
  white-space:nowrap;
}
.hint { color:var(--muted); font-size:13px; margin:2px 0 12px; }
.board {
  position:relative; width:100%; max-width:var(--board-max); margin:0 auto; border-radius:18px; overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.35); line-height:0;
}
.board img {
  width:100%; height:auto; display:block; touch-action:manipulation; user-select:none; -webkit-user-select:none; -webkit-user-drag:none;
}
.dev-mode-flag {
  display:none;
  color:#ff4d4f;
  font-weight:700;
  font-size:13px;
  line-height:1;
  padding:0 4px;
}
.dev-mode-flag.is-visible {
  display:block;
}
.meta-overlay {
  position:absolute;
  left:2.35%;
  top:2.15%;
  max-width:30%;
  pointer-events:none;
  z-index:2;
  display:flex;
  flex-direction:column;
  gap:2px;
}
.meta-line {
  font-family:"Zen Kaku Gothic New", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
  font-weight:700;
  line-height:1.06;
  letter-spacing:0.02em;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.date-overlay {
  font-size:clamp(12px, 0.96vw, 15px);
}
.count-overlay {
  font-size:clamp(12px, 0.96vw, 15px);
}
.name-overlay {
  font-size:clamp(14px, 1.12vw, 18px);
}
.name-overlay.name-size-small {
  font-size:clamp(12px, 0.98vw, 16px);
}
.name-overlay.name-size-medium {
  font-size:clamp(14px, 1.12vw, 18px);
}
.name-overlay.name-size-large {
  font-size:clamp(16px, 1.28vw, 21px);
}
.meta-line.meta-color-white {
  color:rgba(255,255,255,0.96);
  text-shadow:0 1px 2px rgba(0,0,0,0.34), 0 0 1px rgba(0,0,0,0.26);
}
.meta-line.meta-color-black {
  color:#141414;
  text-shadow:0 1px 2px rgba(255,255,255,0.58), 0 0 1px rgba(255,255,255,0.42);
}
.meta-line.meta-color-red {
  color:#c93642;
  text-shadow:0 1px 2px rgba(255,255,255,0.72), 0 0 1px rgba(255,255,255,0.56);
}
.meta-line.is-hidden {
  display:none;
}
.board.is-raw-export .layer {
  pointer-events:none;
}
.layer { position:absolute; inset:0; z-index:1; }
.hit {
  position:absolute;
  appearance:none;
  -webkit-appearance:none;
  border:0;
  background:transparent;
  padding:0;
  margin:0;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color: transparent;
}
.hit::before {
  content:"";
  position:absolute;
  inset:-8px;
}
.hit:focus-visible {
  outline:2px solid rgba(255,255,255,0.95);
  outline-offset:2px;
  border-radius:6px;
}
.mark {
  position:absolute;
  inset:8%;
  width:84%;
  height:84%;
  pointer-events:none;
}
.mark path.shadow {
  stroke:rgba(255,255,255,0.34);
  stroke-width:20;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
}
.mark path.main {
  stroke:var(--accent);
  stroke-width:14;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
}
.footer { padding:14px 2px 6px; color:var(--muted); font-size:12px; text-align:center; }
.footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; }
.footer a:hover { opacity:0.9; }
@media (max-width:640px) {
  .badge { font-size:13px; padding:9px 11px; }
  button.action { font-size:13px; padding:9px 12px; }
  .name-input,
  .name-color-select,
  .name-size-select { min-width:100%; font-size:13px; padding:9px 12px; }
  .labeled-select {
    width:100%;
  }
  .control-label {
    min-width:64px;
    font-size:12px;
  }
  .dev-mode-flag { font-size:12px; padding:0; }
  .meta-overlay { max-width:48%; }
  .date-overlay { font-size:clamp(11px, 2.7vw, 14px); }
  .count-overlay { font-size:clamp(11px, 2.7vw, 14px); }
  .name-overlay { font-size:clamp(12px, 3.2vw, 16px); }
  .hint { font-size:12px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <div class="badge" id="countBadge">0 / 41</div>
    <div class="badge" id="saveBadge">保存済み</div>
    <div class="badge env-badge">DEV</div>
    <input class="name-input" id="nameInput" type="text" maxlength="32" placeholder="名前（任意）">

        <option value="red">赤</option>
        <option value="white">白</option>
      </select>
    </div>
    <div class="labeled-select">
      <span class="control-label">名前サイズ</span>
      <select class="name-size-select" id="nameSizeSelect" aria-label="名前サイズ">
        <option value="small">小</option>
        <option value="medium" selected>中</option>
        <option value="large">大</option>

  ctx.save();

  ctx.strokeStyle = "rgba(255,255,255,0.34)";
  ctx.lineWidth = 20;
  ctx.beginPath();
  ctx.moveTo(p1x, p1y);
  ctx.lineTo(p2x, p2y);

  ctx.strokeStyle = "#ff4d4f";

  ctx.restore();
}

function getNameColorStyle(color) {

  if (normalized === "red") {

function fitFontSize(ctx, text, fontWeight, startSize, minSize, maxTextWidth, fontFamily) {

    ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
    if (ctx.measureText(text).width <= maxTextWidth || fontSize <= minSize) break;

function drawMetaOnContext(ctx, dateText, countText, nameText, color, size) {
  const normalizedName = normalizeName(nameText);
  const normalizedDate = String(dateText || "").trim();
  const normalizedCount = String(countText || "").trim();
  if (!normalizedDate && !normalizedCount && !normalizedName) return;

  const style = getNameColorStyle(color);
  const normalizedSize = normalizeNameSize(size);
  const fontFamily = `"Zen Kaku Gothic New", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif`;
  const maxTextWidth = IMAGE_WIDTH * 0.30;
  const x = 48;
  const dateY = 42;

  const nameY = normalizedName ? 102 : 0;

  ctx.lineJoin = "round";

    ctx.strokeStyle = style.stroke;
    ctx.lineWidth = 4;
    ctx.strokeText(normalizedDate, x, dateY);
    ctx.fillStyle = style.fill;
    ctx.fillText(normalizedDate, x, dateY);
  }

  if (normalizedCount) {
    const countSize = fitFontSize(ctx, normalizedCount, 700, 30, 22, maxTextWidth, fontFamily);
    ctx.font = `700 ${countSize}px ${fontFamily}`;
    ctx.strokeStyle = style.stroke;
    ctx.lineWidth = 4;
    ctx.strokeText(normalizedCount, x, countY);
    ctx.fillStyle = style.fill;
    ctx.fillText(normalizedCount, x, countY);
  }

  if (normalizedName) {
    const nameSize = fitFontSize(ctx, normalizedName, 700, nameStartSize, nameMinSize, maxTextWidth, fontFamily);
    ctx.font = `700 ${nameSize}px ${fontFamily}`;
    ctx.strokeStyle = style.stroke;
    ctx.lineWidth = 4;

async function buildChecklistBlob() {
  if (!boardImage.complete) {
    await new Promise((resolve, reject) => {
      boardImage.addEventListener("load", resolve, { once: true });
      boardImage.addEventListener("error", reject, { once: true });
    });
  }

  const canvas = document.createElement("canvas");
  canvas.width = IMAGE_WIDTH;
  canvas.height = IMAGE_HEIGHT;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(boardImage, 0, 0, IMAGE_WIDTH, IMAGE_HEIGHT);

  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (e) {}
  }

  const rawMode = isRawExportMode();
  if (!rawMode) {
    drawMetaOnContext(ctx, formatCurrentDate(), `${checkedCount()}/${boxes.length} collected`, displayName, displayNameColor, displayNameSize);
  }

  boxes.forEach((box) => {
    if (!rawMode && state[box.id]) drawCheckOnContext(ctx, box);
  });

  const blob = await new Promise((resolve, reject) => {
    canvas.toBlob((value) => {
      if (value) resolve(value);
      else reject(new Error("画像化に失敗しました。"));
    }, "image/png");
  });

  return blob;
}
function makeExportFileName() {
  const now = new Date();
  const pad = (value) => String(value).padStart(2, "0");

}
function shouldUseNativeShare() {
  const ua = navigator.userAgent || "";
  const isIOS = /iP(hone|ad|od)/.test(ua);
  const isAndroid = /Android/i.test(ua);
  return isIOS || isAndroid;
}
async function saveChecklistImage() {
  const beforeText = saveBadge.textContent;
  saveImageBtn.disabled = true;
  saveBadge.textContent = "画像生成中...";

  try {
    const blob = await buildChecklistBlob();
    const fileName = makeExportFileName();
    const file = typeof File === "function" ? new File([blob], fileName, { type: "image/png" }) : null;
    const canUseShare =
      shouldUseNativeShare() &&
      file &&
      typeof navigator.share === "function" &&
      (typeof navigator.canShare !== "function" || navigator.canShare({ files: [file] }));

    if (canUseShare) {
      saveBadge.textContent = "共有シート起動中...";
      await navigator.share({ files: [file], title: "Fortnite Sprite Checklist" });
      saveBadge.textContent = "保存済み";
      return;
    }

    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    link.remove();

    const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent || "");
    if (isIOS) {
      window.open(url, "_blank", "noopener");
    }

    setTimeout(() => URL.revokeObjectURL(url), 60 * 1000);
    saveBadge.textContent = "保存済み";
  } catch (error) {
    console.error(error);
    if (error && error.name === "AbortError") {
      saveBadge.textContent = beforeText || "保存済み";
    } else {
      saveBadge.textContent = "保存失敗";
    }
  } finally {
    saveImageBtn.disabled = false;
    if (saveBadge.textContent === beforeText && beforeText) saveBadge.textContent = beforeText;
  }
}
