<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Fortnite Sprite Checklist</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#0b1020">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sprite Checklist">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./app.css">
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <span class="badge count" id="countBadge">0 / 46</span>
    <span class="badge saved" id="saveBadge">保存済み</span>
    <div class="lang-switch" aria-label="Language switch">
      <button class="lang-btn is-active" id="langJaBtn" type="button">日本語</button>
      <button class="lang-btn" id="langEnBtn" type="button">English</button>
    </div>
    <button class="action tips-toggle" id="tipsBtn" type="button" aria-expanded="false" aria-controls="tipsPanel">使い方</button>
    <input class="name-input" id="nameInput" type="text" maxlength="32" placeholder="名前（任意）" autocomplete="nickname">
    <span class="pill label" id="colorLabel">文字色</span>
    <select class="select" id="nameColorSelect" aria-label="文字色">
      <option value="black">黒</option>
      <option value="red">赤</option>
      <option value="white">白</option>
    </select>
    <span class="pill label" id="sizeLabel">名前サイズ</span>
    <select class="select" id="nameSizeSelect" aria-label="名前サイズ">
      <option value="small">小</option>
      <option value="medium" selected>中</option>
      <option value="large">大</option>
    </select>
    <span class="spacer"></span>
    <button class="action" id="saveImageBtn" type="button">画像保存</button>
    <button class="action" id="resetBtn" type="button">全解除</button>
  </div>
  <div class="hint" id="pageHint">タップで切替。状態はこの端末のブラウザに保存されます。</div>
  <div class="tips-panel is-hidden" id="tipsPanel">
    <div class="tips-text" id="tipsText"></div>
    <a class="tips-link" id="tipsLink" href="https://x.com/BCH_1025" target="_blank" rel="noopener noreferrer">https://x.com/BCH_1025</a>
  </div>
  <div class="board" id="board">
    <img id="boardImage" src="./images/imagessprseireiv2.png" alt="Fortnite Sprite Checklist">
    <div class="meta-overlay" id="metaOverlay">
      <div class="meta-line date-overlay" id="dateOverlay"></div>
      <div class="meta-line count-overlay" id="countOverlay"></div>
      <div class="meta-line name-overlay is-hidden" id="nameOverlay"></div>
    </div>
    <div class="layer" id="layer" aria-label="Fortnite Sprite Checklist"></div>
    <div id="completeBadge" class="complete-badge" aria-hidden="true">
      <span class="complete-badge-main">COMPLETE!</span>
      <span class="complete-badge-sub">46 / 46 COLLECTED</span>
    </div>
  </div>
  <div class="footer" id="pageFooter">ローカル保存対応 | Produced by BCH | <a href="https://x.com/BCH_1025" target="_blank" rel="noopener noreferrer">X @BCH_1025</a></div>
</div>
<script src="./app.js?v=20260630-android-force-download"></script>
<!-- pages redeploy trigger: 2026-06-26 14:53 JST -->
</body>
</html>
