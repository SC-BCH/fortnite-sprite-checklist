<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fortnite Sprite Checklist</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sprite Checklist">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<style>
:root {
  --bg:#0f1115; --panel:#171b22; --text:#eef2f7; --muted:#a9b3c1; --accent:#ff4d4f; --board-max:1180px;
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  background:linear-gradient(180deg, #0d1015 0%, #141922 100%);
  color:var(--text);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
}
.wrap {
  width:min(100%, calc(var(--board-max) + 24px));
  margin:0 auto;
  padding:max(12px, env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));
}
.toolbar {
  display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px;
}
.badge {
  padding:10px 12px; border-radius:999px; background:var(--panel); font-weight:700; font-size:14px; line-height:1;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
}
.spacer { flex:1 1 auto; }
button.action {
  appearance:none; border:0; border-radius:12px; padding:10px 14px; background:#242c39; color:var(--text); font-weight:700;
  cursor:pointer; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}
.hint { color:var(--muted); font-size:13px; margin:2px 0 12px; }
.board {
  position:relative; width:100%; max-width:var(--board-max); margin:0 auto; border-radius:18px; overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.35); line-height:0;
}
.board img {
  width:100%; height:auto; display:block; touch-action:manipulation; user-select:none; -webkit-user-select:none; -webkit-user-drag:none;
}
.overlay { position:absolute; inset:0; width:100%; height:100%; }
.hit { fill:rgba(255,255,255,0.001); cursor:pointer; }
.check-line {
  stroke:var(--accent); stroke-width:10; stroke-linecap:round; stroke-linejoin:round; fill:none; vector-effect:non-scaling-stroke; pointer-events:none;
}
.check-shadow {
  stroke:rgba(255,255,255,0.32); stroke-width:14; stroke-linecap:round; stroke-linejoin:round; fill:none; vector-effect:non-scaling-stroke; pointer-events:none;
}
.footer { padding:14px 2px 6px; color:var(--muted); font-size:12px; text-align:center; }
@media (max-width:640px) {
  .badge { font-size:13px; padding:9px 11px; }
  button.action { font-size:13px; padding:9px 12px; }
  .hint { font-size:12px; }
}
</style>
</head>

const overlay = document.getElementById("overlay");
const countBadge = document.getElementById("countBadge");
const saveBadge = document.getElementById("saveBadge");
const resetBtn = document.getElementById("resetBtn");

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  saveBadge.textContent = "保存済み";
}
let state = loadState();
function checkedCount() {
  return Object.values(state).filter(Boolean).length;
}
function updateCount() {
  countBadge.textContent = `${checkedCount()} / 41`;
}
function toggle(id) {
  state[id] = !state[id];
  saveBadge.textContent = "保存中...";
  saveState(state);
  render();
}
function appendCheck(group, x, y, w, h) {
  const p1x = x + w * 0.18;
  const p1y = y + h * 0.56;
  const p2x = x + w * 0.42;
  const p2y = y + h * 0.78;
  const p3x = x + w * 0.82;
  const p3y = y + h * 0.24;
  const points = `${p1x},${p1y} ${p2x},${p2y} ${p3x},${p3y}`;

  const shadow = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
  shadow.setAttribute("points", points);
  shadow.setAttribute("class", "check-shadow");

  const line = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
  line.setAttribute("points", points);
  line.setAttribute("class", "check-line");

  group.appendChild(shadow);
  group.appendChild(line);
}
function render() {
  overlay.innerHTML = "";
  boxes.forEach((b) => {
    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    const hit = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    hit.setAttribute("x", b.x);
    hit.setAttribute("y", b.y);
    hit.setAttribute("width", b.w);
    hit.setAttribute("height", b.h);
    hit.setAttribute("rx", 6);
    hit.setAttribute("class", "hit");
    hit.setAttribute("role", "button");
    hit.setAttribute("tabindex", "0");
    hit.setAttribute("aria-label", b.label);
    hit.addEventListener("click", () => toggle(b.id));
    hit.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        toggle(b.id);
      }
    });
    group.appendChild(hit);
    if (state[b.id]) appendCheck(group, b.x, b.y, b.w, b.h);
    overlay.appendChild(group);
  });
  updateCount();
}
resetBtn.addEventListener("click", () => {
  state = {};
  saveBadge.textContent = "保存中...";
  saveState(state);
  render();
});
render();
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
