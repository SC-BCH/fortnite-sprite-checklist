<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fortnite Sprite Checklist</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sprite Checklist">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<style>
:root {
  --bg:#0f1115; --panel:#171b22; --text:#eef2f7; --muted:#a9b3c1; --accent:#ff4d4f; --board-max:1180px;
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  background:linear-gradient(180deg, #0d1015 0%, #141922 100%);
  color:var(--text);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
}
.wrap {
  width:min(100%, calc(var(--board-max) + 24px));
  margin:0 auto;
  padding:max(12px, env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));
}
.toolbar {
  display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px;
}
.badge {
  padding:10px 12px; border-radius:999px; background:var(--panel); font-weight:700; font-size:14px; line-height:1;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
}
.spacer { flex:1 1 auto; }
button.action {
  appearance:none; border:0; border-radius:12px; padding:10px 14px; background:#242c39; color:var(--text); font-weight:700;
  cursor:pointer; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}
.name-input {
  appearance:none;
  -webkit-appearance:none;
  border:0;
  border-radius:12px;
  padding:10px 14px;
  min-width:180px;
  background:#242c39;
  color:var(--text);
  font:inherit;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}
.name-input::placeholder {
  color:rgba(238,242,247,0.58);
}
.hint { color:var(--muted); font-size:13px; margin:2px 0 12px; }
.board {
  position:relative; width:100%; max-width:var(--board-max); margin:0 auto; border-radius:18px; overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.35); line-height:0;
}
.board img {
  width:100%; height:auto; display:block; touch-action:manipulation; user-select:none; -webkit-user-select:none; -webkit-user-drag:none;
}
.name-overlay {
  position:absolute;
  left:2.2%;
  top:2.2%;
  max-width:34%;
  padding:10px 16px;
  border-radius:16px;
  background:rgba(255,255,255,0.82);
  color:#1b2330;
  font-weight:800;
  font-size:clamp(16px, 1.8vw, 28px);
  line-height:1.2;
  letter-spacing:0.02em;
  box-shadow:0 6px 18px rgba(0,0,0,0.16);
  pointer-events:none;
  z-index:2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.name-overlay.is-hidden {
  display:none;
}
.layer { position:absolute; inset:0; z-index:1; }
.hit {
  position:absolute;
  appearance:none;
  -webkit-appearance:none;
  border:0;
  background:transparent;
  padding:0;
  margin:0;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color: transparent;
}
.hit::before {
  content:"";
  position:absolute;
  inset:-8px;
}
.hit:focus-visible {
  outline:2px solid rgba(255,255,255,0.95);
  outline-offset:2px;
  border-radius:6px;
}
.mark {
  position:absolute;
  inset:8%;
  width:84%;
  height:84%;
  pointer-events:none;
}
.mark path.shadow {
  stroke:rgba(255,255,255,0.34);
  stroke-width:20;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
}
.mark path.main {
  stroke:var(--accent);
  stroke-width:14;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
}
.footer { padding:14px 2px 6px; color:var(--muted); font-size:12px; text-align:center; }
@media (max-width:640px) {
  .badge { font-size:13px; padding:9px 11px; }
  button.action { font-size:13px; padding:9px 12px; }
  .name-input { min-width:100%; font-size:13px; padding:9px 12px; }
  .name-overlay { max-width:42%; padding:8px 12px; }
  .hint { font-size:12px; }
}
</style>
</head>

const layer = document.getElementById("layer");
const boardImage = document.getElementById("boardImage");
const countBadge = document.getElementById("countBadge");
const saveBadge = document.getElementById("saveBadge");
const nameInput = document.getElementById("nameInput");
const nameOverlay = document.getElementById("nameOverlay");
const saveImageBtn = document.getElementById("saveImageBtn");
const resetBtn = document.getElementById("resetBtn");
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  saveBadge.textContent = "保存済み";
}
function loadName() {
  try {
    return localStorage.getItem(NAME_STORAGE_KEY) || "";
  } catch (e) {
    return "";
  }
}
function normalizeName(value) {
  return String(value || "").replace(/\s+/g, " ").trim().slice(0, 32);
}
function saveName(value) {
  const normalized = normalizeName(value);
  localStorage.setItem(NAME_STORAGE_KEY, normalized);
  saveBadge.textContent = "保存済み";
  return normalized;
}
let state = loadState();
let displayName = loadName();
function checkedCount() {
  return Object.values(state).filter(Boolean).length;
}
function updateCount() {
  countBadge.textContent = `${checkedCount()} / ${boxes.length}`;
}
function pctX(v) { return (v / IMAGE_WIDTH) * 100; }
function pctY(v) { return (v / IMAGE_HEIGHT) * 100; }
function makeMark() {
  const wrap = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  wrap.setAttribute("viewBox", "0 0 100 100");
  wrap.setAttribute("class", "mark");
  const shadow = document.createElementNS("http://www.w3.org/2000/svg", "path");
  shadow.setAttribute("d", "M18 54 L40 76 L82 24");
  shadow.setAttribute("class", "shadow");
  const main = document.createElementNS("http://www.w3.org/2000/svg", "path");
  main.setAttribute("d", "M18 54 L40 76 L82 24");
  main.setAttribute("class", "main");

}
function drawCheckOnContext(ctx, box) {
  const p1x = box.x + box.w * 0.18;
  const p1y = box.y + box.h * 0.56;
  const p2x = box.x + box.w * 0.40;
  const p2y = box.y + box.h * 0.76;
  const p3x = box.x + box.w * 0.82;
  const p3y = box.y + box.h * 0.24;

  ctx.save();
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  ctx.strokeStyle = "rgba(255,255,255,0.34)";
  ctx.lineWidth = 20;
  ctx.beginPath();
  ctx.moveTo(p1x, p1y);
  ctx.lineTo(p2x, p2y);
  ctx.lineTo(p3x, p3y);
  ctx.stroke();

  ctx.strokeStyle = "#ff4d4f";
  ctx.lineWidth = 14;
  ctx.beginPath();
  ctx.moveTo(p1x, p1y);
  ctx.lineTo(p2x, p2y);

  ctx.restore();

function syncNameOverlay() {

    nameOverlay.textContent = normalized;
    nameOverlay.classList.remove("is-hidden");

  }

function drawRoundedRect(ctx, x, y, width, height, radius) {
  const r = Math.min(radius, width / 2, height / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + width - r, y);
  ctx.arcTo(x + width, y, x + width, y + r, r);
  ctx.lineTo(x + width, y + height - r);
  ctx.arcTo(x + width, y + height, x + width - r, y + height, r);
  ctx.lineTo(x + r, y + height);
  ctx.arcTo(x, y + height, x, y + height - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}
function drawNameOnContext(ctx, name) {

  const maxTextWidth = IMAGE_WIDTH * 0.34;

    ctx.font = `800 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif`;
    if (ctx.measureText(normalized).width <= maxTextWidth || fontSize <= 28) break;
    fontSize -= 2;
  } while (fontSize > 28);

  const metrics = ctx.measureText(normalized);
  const padX = 22;
  const padY = 14;
  const x = 44;
  const y = 44;
  const boxWidth = Math.ceil(metrics.width + padX * 2);
  const boxHeight = Math.ceil(fontSize + padY * 2);

  ctx.save();
  drawRoundedRect(ctx, x, y, boxWidth, boxHeight, 18);
  ctx.fillStyle = "rgba(255,255,255,0.82)";
  ctx.fill();
  ctx.strokeStyle = "rgba(27,35,48,0.18)";
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = "#1b2330";
  ctx.textBaseline = "top";
  ctx.font = `800 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif`;
  ctx.fillText(normalized, x + padX, y + padY - 1);
  ctx.restore();

async function buildChecklistBlob() {
  if (!boardImage.complete) {
    await new Promise((resolve, reject) => {
      boardImage.addEventListener("load", resolve, { once: true });
      boardImage.addEventListener("error", reject, { once: true });
    });
  }

  const canvas = document.createElement("canvas");
  canvas.width = IMAGE_WIDTH;
  canvas.height = IMAGE_HEIGHT;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(boardImage, 0, 0, IMAGE_WIDTH, IMAGE_HEIGHT);
  drawNameOnContext(ctx, displayName);

  boxes.forEach((box) => {
    if (state[box.id]) drawCheckOnContext(ctx, box);
  });

  const blob = await new Promise((resolve, reject) => {
    canvas.toBlob((value) => {
      if (value) resolve(value);
      else reject(new Error("画像化に失敗しました。"));
    }, "image/png");
  });

  return blob;
}
function makeExportFileName() {
  const now = new Date();
  const pad = (value) => String(value).padStart(2, "0");
  return `fortnite_sprite_checklist_${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.png`;
}
function shouldUseNativeShare() {
  const ua = navigator.userAgent || "";
  const isIOS = /iP(hone|ad|od)/.test(ua);
  const isAndroid = /Android/i.test(ua);
  return isIOS || isAndroid;
}
async function saveChecklistImage() {
  const beforeText = saveBadge.textContent;
  saveImageBtn.disabled = true;
  saveBadge.textContent = "画像生成中...";

  try {
    const blob = await buildChecklistBlob();
    const fileName = makeExportFileName();
    const canMakeFile = typeof File === "function";
    const file = canMakeFile ? new File([blob], fileName, { type: "image/png" }) : null;
    const canUseNativeShare =
      shouldUseNativeShare() &&
      !!file &&
      typeof navigator.share === "function" &&
      (
        typeof navigator.canShare !== "function" ||
        navigator.canShare({ files: [file] })
      );

    if (canUseNativeShare) {
      saveBadge.textContent = "共有シート起動中...";
      await navigator.share({ files: [file], title: "Fortnite Sprite Checklist" });
      saveBadge.textContent = "保存済み";
      return;
    }

    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    link.remove();

    const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent || "");
    if (isIOS) {
      window.open(url, "_blank", "noopener");
    }

    setTimeout(() => URL.revokeObjectURL(url), 60 * 1000);
    saveBadge.textContent = "保存済み";
  } catch (error) {
    console.error(error);
    if (error && error.name === "AbortError") {
      saveBadge.textContent = beforeText || "保存済み";
    } else {
      saveBadge.textContent = "保存失敗";
    }
  } finally {
    saveImageBtn.disabled = false;
    if (saveBadge.textContent === beforeText && beforeText) saveBadge.textContent = beforeText;
  }
}
function toggle(id) {
  state[id] = !state[id];
  saveBadge.textContent = "保存中...";
  saveState(state);
  render();
}
function render() {
  layer.innerHTML = "";
  boxes.forEach((b) => {
    const btn = document.createElement("button");

    btn.className = "hit";
    btn.style.left = pctX(b.x) + "%";
    btn.style.top = pctY(b.y) + "%";
    btn.style.width = pctX(b.w) + "%";
    btn.style.height = pctY(b.h) + "%";
    btn.setAttribute("aria-label", b.label);
    btn.setAttribute("aria-pressed", state[b.id] ? "true" : "false");
    btn.addEventListener("click", () => toggle(b.id));
    btn.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        toggle(b.id);
      }
    });
    if (state[b.id]) btn.appendChild(makeMark());
    layer.appendChild(btn);
  });

}
