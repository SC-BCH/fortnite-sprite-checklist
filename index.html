<style>
  :root {
    --bg: #0f1115;
    --panel: #171b22;
    --text: #eef2f7;
    --muted: #a9b3c1;
    --accent: #ff4d4f;
    --accent-soft: rgba(255, 77, 79, 0.14);
    --board-max: 1180px;

    padding: 12px;

    z-index: 20;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;

    backdrop-filter: blur(6px);
  }
  .badge {
    padding: 10px 12px;
    border-radius: 999px;
    background: var(--panel);
    font-weight: 700;
    font-size: 14px;
    line-height: 1;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  .spacer { flex: 1 1 auto; }
  button.action {
    appearance: none;
    border: 0;
    border-radius: 12px;
    padding: 10px 14px;
    background: var(--panel);
    color: var(--text);
    font-weight: 700;
    cursor: pointer;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
  }
  button.action.primary {
    background: #242c39;
  }
  .hint {
    color: var(--muted);
    font-size: 13px;
    margin: 2px 0 12px;
  }
  .board {
    position: relative;
    width: 100%;

    background-size: cover;
    background-position: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  .box {
    position: absolute;
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    border: 0;
    margin: 0;
    padding: 0;
    cursor: pointer;
    border-radius: 6px;
  }
  .box:focus-visible {
    outline: 2px solid rgba(255,255,255,0.95);
    outline-offset: 2px;
  }
  .box::before {
    content: "";
    position: absolute;
    inset: -7px;
  }
  .box.checked::after {
    content: "✕";
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    color: var(--accent);
    font-weight: 900;
    font-size: clamp(28px, 2.6vw, 42px);
    line-height: 1;

    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
  @media (max-width: 640px) {
    .badge { font-size: 13px; padding: 9px 11px; }
    button.action { font-size: 13px; padding: 9px 12px; }
    .hint { font-size: 12px; }

const board = document.getElementById("board");
const countBadge = document.getElementById("countBadge");
const saveBadge = document.getElementById("saveBadge");
const resetBtn = document.getElementById("resetBtn");

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  saveBadge.textContent = "保存済み";
}

let state = loadState();

function checkedCount() {
  return Object.values(state).filter(Boolean).length;
}

function updateCount() {
  countBadge.textContent = `${checkedCount()} / 41`;
}

function render() {
  board.innerHTML = "";
  boxes.forEach((b) => {
    const el = document.createElement("button");
    el.type = "button";
    el.className = "box" + (state[b.id] ? " checked" : "");
    el.title = b.label;
    el.setAttribute("aria-label", b.label);
    el.setAttribute("aria-pressed", state[b.id] ? "true" : "false");
    el.style.left = b.left_pct + "%";
    el.style.top = b.top_pct + "%";
    el.style.width = b.width_pct + "%";
    el.style.height = b.height_pct + "%";
    el.addEventListener("click", () => {
      state[b.id] = !state[b.id];
      saveBadge.textContent = "保存中...";
      saveState(state);
      render();
    });
    board.appendChild(el);
  });
  updateCount();
}

resetBtn.addEventListener("click", () => {
  state = {};
  saveBadge.textContent = "保存中...";
  saveState(state);
  render();
});

render();
