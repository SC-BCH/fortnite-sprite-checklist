<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fortnite Sprite Checklist</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sprite Checklist">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<style>
:root {
  --bg:#0f1115; --panel:#171b22; --text:#eef2f7; --muted:#a9b3c1; --accent:#ff4d4f; --board-max:1180px;
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  background:linear-gradient(180deg, #0d1015 0%, #141922 100%);
  color:var(--text);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
}
.wrap {
  width:min(100%, calc(var(--board-max) + 24px));
  margin:0 auto;
  padding:max(12px, env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));
}
.toolbar {
  display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px;
}
.badge {
  padding:10px 12px; border-radius:999px; background:var(--panel); font-weight:700; font-size:14px; line-height:1;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
}
.spacer { flex:1 1 auto; }
button.action {
  appearance:none; border:0; border-radius:12px; padding:10px 14px; background:#242c39; color:var(--text); font-weight:700;
  cursor:pointer; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}
.hint { color:var(--muted); font-size:13px; margin:2px 0 12px; }
.board {
  position:relative; width:100%; max-width:var(--board-max); margin:0 auto; border-radius:18px; overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.35); line-height:0;
}
.board img {
  width:100%; height:auto; display:block; touch-action:manipulation; user-select:none; -webkit-user-select:none; -webkit-user-drag:none;
}
.layer { position:absolute; inset:0; }
.hit {
  position:absolute;
  appearance:none;
  -webkit-appearance:none;
  border:0;
  background:transparent;
  padding:0;
  margin:0;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color: transparent;
}
.hit::before {
  content:"";
  position:absolute;
  inset:-8px;
}
.hit:focus-visible {
  outline:2px solid rgba(255,255,255,0.95);
  outline-offset:2px;
  border-radius:6px;
}
.mark {
  position:absolute;
  inset:8%;
  width:84%;
  height:84%;
  pointer-events:none;
}
.mark path.shadow {
  stroke:rgba(255,255,255,0.34);
  stroke-width:18;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
}
.mark path.main {
  stroke:var(--accent);
  stroke-width:12;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
}
.footer { padding:14px 2px 6px; color:var(--muted); font-size:12px; text-align:center; }
@media (max-width:640px) {
  .badge { font-size:13px; padding:9px 11px; }
  button.action { font-size:13px; padding:9px 12px; }
  .hint { font-size:12px; }
}
</style>
</head>

    const fileName = makeExportFileName();
    const canMakeFile = typeof File === "function";
    const file = canMakeFile ? new File([blob], fileName, { type: "image/png" }) : null;
    const canUseNativeShare =
      shouldUseNativeShare() &&
      !!file &&
      typeof navigator.share === "function" &&
      (
        typeof navigator.canShare !== "function" ||
        navigator.canShare({ files: [file] })
      );

    if (canUseNativeShare) {
      saveBadge.textContent = "共有シート起動中...";
      await navigator.share({ files: [file], title: "Fortnite Sprite Checklist" });
      saveBadge.textContent = "保存済み";
      return;
    }

    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    link.remove();

    const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent || "");
    if (isIOS) {
      window.open(url, "_blank", "noopener");
    }

    setTimeout(() => URL.revokeObjectURL(url), 60 * 1000);
    saveBadge.textContent = "保存済み";
  } catch (error) {
    console.error(error);
    if (error && error.name === "AbortError") {
      saveBadge.textContent = beforeText || "保存済み";
    } else {
      saveBadge.textContent = "保存失敗";
    }
  } finally {
    saveImageBtn.disabled = false;
    if (saveBadge.textContent === beforeText && beforeText) saveBadge.textContent = beforeText;
  }
}
function toggle(id) {
  state[id] = !state[id];
  saveBadge.textContent = "保存中...";
  saveState(state);
  render();
}
function render() {
  layer.innerHTML = "";
  boxes.forEach((b) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "hit";
    btn.style.left = pctX(b.x) + "%";
    btn.style.top = pctY(b.y) + "%";
    btn.style.width = pctX(b.w) + "%";
    btn.style.height = pctY(b.h) + "%";
    btn.setAttribute("aria-label", b.label);
    btn.setAttribute("aria-pressed", state[b.id] ? "true" : "false");
    btn.addEventListener("click", () => toggle(b.id));
    btn.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        toggle(b.id);
      }
    });
    if (state[b.id]) btn.appendChild(makeMark());
    layer.appendChild(btn);
  });
  updateCount();
}
saveImageBtn.addEventListener("click", () => {
  saveChecklistImage();
});
resetBtn.addEventListener("click", () => {
  state = {};
  saveBadge.textContent = "保存中...";
  saveState(state);
  render();
});
render();
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
